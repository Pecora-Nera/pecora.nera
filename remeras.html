<!DOCTYPE html>
<html>
<head>
<title>Remeras</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<h1>👕 Remeras</h1>

<img src="imagenes/remera1.png" width="200">

<br><br>

<label>Talle:</label>
<select id="talle">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>
</select>

<br><br>

<label>Cantidad:</label>
<input type="number" id="cantidad" value="1" min="1">

<br><br>

<button onclick="enviarWhatsApp()">
Consultar por WhatsApp
</button>

<br><br>

<a href="index.html">⬅ Volver</a>

<script>

function enviarWhatsApp(){

let talle = document.getElementById("talle").value;
let color = document.getElementById("color").value;
let cantidad = document.getElementById("cantidad").value;

let mensaje =
"Hola! Quiero consultar:\n\n" +
"Producto: Remera\n" +
"Talle: " + talle + "\n" +
"Color: " + color + "\n" +
"Cantidad: " + cantidad;

window.open("https://wa.me/5493624772154?text=" + encodeURIComponent(mensaje));

}

</script>

</body>
</html>
